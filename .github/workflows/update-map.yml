name: Update Map Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: update-map-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Refresh parcels data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python scripts/update_map_data.py --token "$NOTION_TOKEN"

      - name: Commit updated data
        run: |
          if git diff --quiet; then
            echo "No map changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/parcels.json
          git commit -m "Update map data"
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          git push origin HEAD:"${GITHUB_REF_NAME:-main}"
